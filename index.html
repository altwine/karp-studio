<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Karp Studio</title>
		<link rel="stylesheet" href="./src/styles.css" />
	</head>
	<body>
		<header>
			<span id="title">ИСР КАРП</span>
			<div id="menuBar">
				<button class="menuItem" id="runCodeButton" title="Запустить программу (F5)">
					<i class="icon">play_circle</i>
					<span>запуск</span>
				</button>
				<button class="menuItem" id="examplesButton">
					<i class="icon">code_blocks</i>
					<span>примеры</span>
				</button>
				<button class="menuItem" id="referenceButton">
					<i class="icon">book_2</i>
					<span>справка</span>
				</button>
			</div>
			<div id="windowControls">
				<button id="minimizeWindow" class="icon" title="Свернуть окно">minimize</button>
				<button id="maximizeWindow" class="icon" title="Развернуть окно">ad</button>
				<button id="closeWindow" class="icon" title="Закрыть окно">close</button>
			</div>
		</header>
		<div id="mainContainer">
			<aside id="left">Left</aside>
			<div class="resizer" id="resizerLeft"></div>
			<main>
				<div id="lineNumbers"></div>
				<textarea id="editor" placeholder="Здесь код" wrap="soft"></textarea>
			</main>
			<div class="resizer" id="resizerRight"></div>
			<aside id="right">
				<div id="text-output" class="output-area"></div>
				<hr />
				<canvas id="graphics-output" class="output-area" width="300px" height="300px"></canvas>
			</aside>
		</div>
		<footer>
			<span>позиция курсора:</span>
			<span id="cursor-position">1:0</span>
		</footer>
		<div id="contextMenu" class="context-menu hidden">
			<div class="menu-item" data-action="cut" data-target="editor">
				<i class="icon">content_cut</i>
				<span>вырезать</span>
			</div>
			<div class="menu-item" data-action="copy" data-target="editor">
				<i class="icon">content_copy</i>
				<span>копировать</span>
			</div>
			<div class="menu-item" data-action="paste" data-target="editor">
				<i class="icon">content_paste</i>
				<span>вставить</span>
			</div>
			<div class="menu-item" data-action="delete" data-target="editor">
				<i class="icon">delete</i>
				<span>удалить</span>
			</div>
			<div class="menu-item" data-action="about" data-target="title">
				<i class="icon">help</i>
				<span>узнать больше</span>
			</div>
			<div class="menu-item" data-action="file-issue" data-target="title">
				<i class="icon">bug_report</i>
				<span>рассказать о баге</span>
			</div>
		</div>
		<script type="module" src="./src/index.ts"></script>
	</body>
</html>
